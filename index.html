<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Планирование экзаменов от Альберта группы 5551</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #72a8ff, #9c7dff, #ff9fd2);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      overflow-x: hidden;
      color: white;
      position: relative;
    }

    .blur {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    .blur1 {
      background: rgba(255,255,255,0.4);
      top: -80px;
      left: -80px;
    }

    .blur2 {
      background: rgba(133, 89, 255, 0.5);
      bottom: -80px;
      right: -80px;
    }

    .container {
      width: 100%;
      max-width: 1150px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.15);
    }

    .sidebar {
      padding: 28px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .info-card {
      padding: 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 24px;
    }

    .info-label {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .info-value {
      font-size: 40px;
      font-weight: 700;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input, button {
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 15px;
    }

    input {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    button {
      background: rgba(255,255,255,0.22);
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.3);
    }

    .main {
      padding: 28px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .exam-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .exam-card {
      background: rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.25s ease;
    }

    .exam-card:hover {
      transform: scale(1.02);
      background: rgba(255,255,255,0.15);
    }

    .exam-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .exam-date {
      opacity: 0.8;
      font-size: 14px;
    }

    .days-left {
      text-align: right;
    }

    .days-number {
      font-size: 34px;
      font-weight: 700;
    }

    .days-text {
      opacity: 0.7;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      opacity: 0.75;
      margin-top: 60px;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="blur blur1"></div>
  <div class="blur blur2"></div>

  <div class="container">

    <div class="sidebar glass">
      <div class="title">Exam Planner</div>
      <div class="subtitle">
        Планируй подготовку к экзаменам и следи, сколько дней осталось до дедлайна.
      </div>

      <div class="info-card">
        <div class="info-label">Всего экзаменов</div>
        <div class="info-value" id="examCount">0</div>
      </div>

      <form id="examForm">
        <input type="text" id="examName" placeholder="Название экзамена" required>
        <input type="date" id="examDate" required>
        <button type="submit">Добавить экзамен</button>
      </form>
    </div>

    <div class="main glass">
      <div class="section-title">Мои экзамены</div>

      <div class="exam-list" id="examList">
        <div class="empty">Пока нет экзаменов 📚</div>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById('examForm');
    const examList = document.getElementById('examList');
    const examCount = document.getElementById('examCount');

    let exams = [];

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('examName').value;
      const date = document.getElementById('examDate').value;

      exams.push({ name, date });

      renderExams();
      form.reset();
    });

    function renderExams() {
      examList.innerHTML = '';
      examCount.textContent = exams.length;

      if (exams.length === 0) {
        examList.innerHTML = '<div class="empty">Пока нет экзаменов 📚</div>';
        return;
      }

      exams.forEach(exam => {
        const today = new Date();
        const examDate = new Date(exam.date);

        const diffTime = examDate - today;
        const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const card = document.createElement('div');
        card.className = 'exam-card';

        card.innerHTML = `
          <div>
            <div class="exam-name">${exam.name}</div>
            <div class="exam-date">Дата: ${exam.date}</div>
          </div>

          <div class="days-left">
            <div class="days-number">${daysLeft}</div>
            <div class="days-text">дней осталось</div>
          </div>
        `;

        examList.appendChild(card);
      });
    }
  </script>

</body>
</html>
