<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>PU Chat</title>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #FFF8D0;
  --bg-card: #FFFFFF;
  --bg-msg-in: #FFFFFF;
  --bg-msg-out: #E84040;
  --accent: #E84040;
  --border-col: #1A1410;
  --text: #1A1410;
  --text-muted: #5A4A40;
  --border: 3px solid #1A1410;
  --shadow: 5px 5px 0px #1A1410;
}

[data-theme="dark"] {
  --bg: #08080F;
  --bg-card: #0B1929;
  --bg-msg-in: #0B1929;
  --bg-msg-out: #B83030;
  --accent: #FF5349;
  --border-col: #1E3A5F;
  --text: #E8EAF0;
  --text-muted: #7A8BAA;
  --border: 3px solid #1E3A5F;
  --shadow: 5px 5px 0px #0D2B50;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  border-bottom: var(--border);
  background: var(--bg-card);
}

.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--accent);
}

.header-title {
  flex: 1;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 3px;
  font-size: 22px;
}

.theme-toggle {
  width: 42px;
  height: 42px;
  border: var(--border);
  background: var(--bg-card);
  cursor: pointer;
  box-shadow: var(--shadow);
}

.chat-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 64px);
}

.chat-title-bar {
  padding: 16px 24px;
  border-bottom: var(--border);
  display: flex;
  align-items: center;
}

.chat-section-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  color: var(--accent);
}

.chat-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg-wrapper {
  display: flex;
  flex-direction: column;
  align-self: flex-end;
  max-width: 75%;
}

.msg-bubble {
  background: var(--bg-msg-out);
  color: white;
  border: var(--border);
  padding: 12px 16px;
  box-shadow: var(--shadow);
  word-break: break-word;
}

.msg-time {
  font-size: 10px;
  margin-top: 4px;
  color: var(--text-muted);
}

.chat-input-area {
  border-top: var(--border);
  display: flex;
  gap: 12px;
  padding: 16px;
  align-items: flex-end;
  background: var(--bg-card);
}

.attach-btn,
.send-btn {
  width: 44px;
  height: 44px;
  border: var(--border);
  background: var(--bg-card);
  cursor: pointer;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}

.send-btn {
  background: var(--accent);
  color: white;
}

.chat-textarea {
  width: 100%;
  min-height: 44px;
  max-height: 140px;
  resize: none;
  border: var(--border);
  padding: 12px;
  font-family: inherit;
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow);
}

.input-wrapper {
  flex: 1;
}

  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">PU</div>

  <div class="header-title">
    PRIVATE UNIVERSITY
  </div>

  <button
    class="theme-toggle"
    id="themeToggle"
    onclick="toggleTheme()"
  >
    🌙
  </button>
</header>

<main class="chat-page">

  <div class="chat-title-bar">
    <div class="chat-section-name">
      ЛЕКЦИИ
    </div>

    <div class="chat-count" id="msgCount">
      0 запис.
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">

    <div class="input-wrapper">
      <textarea
        id="chatInput"
        class="chat-textarea"
        placeholder="Введите сообщение..."
      ></textarea>
    </div>

    <button class="send-btn" id="sendBtn">
      ➤
    </button>

  </div>

</main>

<script>
(function initTheme() {
  const stored = localStorage.getItem('pu-theme') || 'light';

  document.documentElement.setAttribute(
    'data-theme',
    stored
  );
})();

function toggleTheme() {
  const current =
    document.documentElement.getAttribute(
      'data-theme'
    ) || 'light';

  const next =
    current === 'light'
      ? 'dark'
      : 'light';

  document.documentElement.setAttribute(
    'data-theme',
    next
  );

  localStorage.setItem(
    'pu-theme',
    next
  );

  const btn =
    document.getElementById(
      'themeToggle'
    );

  if (btn) {
    btn.textContent =
      next === 'dark'
        ? '☀️'
        : '🌙';
  }
}

const STORAGE_KEY =
  'pu-chat-messages';

let messages = [];

function loadMessages() {
  try {
    const raw =
      localStorage.getItem(
        STORAGE_KEY
      );

    messages =
      raw
        ? JSON.parse(raw)
        : [];
  } catch {
    messages = [];
  }
}

function saveMessages() {
  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(messages)
  );
}

function formatTime(ts) {
  return new Date(ts)
    .toLocaleTimeString(
      'ru-RU',
      {
        hour: '2-digit',
        minute: '2-digit'
      }
    );
}

function renderMessages() {
  const container =
    document.getElementById(
      'chatMessages'
    );

  container.innerHTML = '';

  messages.forEach(msg => {

    const wrapper =
      document.createElement('div');

    wrapper.className =
      'msg-wrapper';

    wrapper.innerHTML = `
      <div class="msg-bubble">
        ${msg.text}
      </div>

      <div class="msg-time">
        ${formatTime(msg.ts)}
      </div>
    `;

    container.appendChild(
      wrapper
    );
  });

  container.scrollTop =
    container.scrollHeight;

  updateCounter();
}

function updateCounter() {
  const el =
    document.getElementById(
      'msgCount'
    );

  el.textContent =
    messages.length +
    ' запис.';
}

function sendMessage(text) {

  const msg = {
    id: Date.now(),
    text: text,
    ts: Date.now()
  };

  messages.push(msg);

  saveMessages();

  renderMessages();
}

function initChat() {

  loadMessages();

  renderMessages();

  const textarea =
    document.getElementById(
      'chatInput'
    );

  const sendBtn =
    document.getElementById(
      'sendBtn'
    );

  textarea.addEventListener(
    'keydown',
    e => {

      if (
        e.key === 'Enter' &&
        !e.shiftKey
      ) {

        e.preventDefault();

        const text =
          textarea.value.trim();

        if (!text) return;

        sendMessage(text);

        textarea.value = '';
      }
    }
  );

  sendBtn.addEventListener(
    'click',
    () => {

      const text =
        textarea.value.trim();

      if (!text) return;

      sendMessage(text);

      textarea.value = '';
    }
  );
}

document.addEventListener(
  'DOMContentLoaded',
  initChat
);
</script>

</body>
</html>
