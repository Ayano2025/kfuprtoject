# Помощник ученикам — монолитный HTML проект

Скопируй код ниже в файл `index.html`, затем загрузи проект в репозиторий на GitHub.

```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник ученикам от Альберта 5551</title>
<style>
:root{
    --bg:#fffaf2;
    --card:#ffffff;
    --text:#141414;
    --yellow:#f4d98b;
    --red:#ef7d7d;
    --scarlet:#ff5c5c;
    --border:#111111;
    --shadow:8px 8px 0px #111;
    --navy:#0d1b2a;
    --transition:0.3s ease;
}

body.dark{
    --bg:#050505;
    --card:#0d1b2a;
    --text:#ffffff;
    --yellow:#d9b85f;
    --red:#bb5d5d;
    --scarlet:#ff7070;
    --border:#ffffff;
    --shadow:8px 8px 0px #1f3c5c;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:var(--transition);
    overflow-x:hidden;
}

header{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:4px solid var(--border);
    background:var(--yellow);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
}

.theme-btn{
    padding:12px 18px;
    border:3px solid var(--border);
    background:var(--scarlet);
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:var(--transition);
}

.theme-btn:hover{
    transform:translate(-3px,-3px);
}

.page{
    min-height:100vh;
    padding:40px 20px;
    display:none;
    animation:fade 0.4s ease;
}

.page.active{
    display:block;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.center{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:30px;
}

.big-title{
    font-size:60px;
    font-weight:900;
    text-align:center;
    margin-bottom:20px;
}

.button-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    width:100%;
    max-width:900px;
}

.main-btn{
    padding:35px 20px;
    border:4px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:24px;
    font-weight:900;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:var(--transition);
    text-transform:uppercase;
}

.main-btn:nth-child(odd){
    background:var(--yellow);
}

.main-btn:nth-child(even){
    background:var(--red);
}

.main-btn:hover{
    transform:translate(-6px,-6px) rotate(-1deg);
}

.subjects-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:40px;
}

.subject-card{
    padding:25px;
    border:4px solid var(--border);
    background:var(--card);
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:var(--transition);
    font-weight:900;
    font-size:20px;
    text-align:center;
}

.subject-card:hover{
    transform:translate(-5px,-5px);
    background:var(--yellow);
}

.back-btn{
    margin-bottom:25px;
    padding:14px 22px;
    border:3px solid var(--border);
    background:var(--scarlet);
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:var(--shadow);
}

.chat-wrapper{
    max-width:1000px;
    margin:auto;
    border:4px solid var(--border);
    background:var(--card);
    box-shadow:var(--shadow);
    overflow:hidden;
}

.chat-header{
    padding:25px;
    background:var(--yellow);
    border-bottom:4px solid var(--border);
}

.chat-header h2{
    font-size:40px;
    text-transform:uppercase;
}

.chat-box{
    height:60vh;
    overflow-y:auto;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    position:relative;
    padding:18px;
    border:3px solid var(--border);
    background:var(--red);
    box-shadow:5px 5px 0px #000;
    animation:pop 0.2s ease;
}

body.dark .message{
    box-shadow:5px 5px 0px #1f3c5c;
}

@keyframes pop{
    from{
        transform:scale(0.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.message .delete{
    position:absolute;
    top:8px;
    right:8px;
    border:none;
    background:black;
    color:white;
    width:28px;
    height:28px;
    cursor:pointer;
    font-weight:bold;
}

.chat-input-area{
    display:flex;
    gap:12px;
    padding:20px;
    border-top:4px solid var(--border);
    background:var(--bg);
}

.chat-input{
    flex:1;
    padding:18px;
    border:3px solid var(--border);
    outline:none;
    font-size:16px;
    background:var(--card);
    color:var(--text);
}

.send-btn,
.attach-btn{
    padding:18px 20px;
    border:3px solid var(--border);
    background:var(--scarlet);
    color:white;
    cursor:pointer;
    font-weight:900;
    box-shadow:var(--shadow);
    transition:var(--transition);
}

.send-btn:hover,
.attach-btn:hover{
    transform:translate(-3px,-3px);
}

.file-preview{
    margin-top:10px;
    padding:10px;
    background:white;
    color:black;
    border:2px dashed black;
}

img.preview-image{
    max-width:250px;
    border:3px solid black;
    margin-top:10px;
}

.hidden{
    display:none;
}

@media(max-width:700px){
    .big-title{
        font-size:40px;
    }

    .chat-header h2{
        font-size:28px;
    }

    .main-btn{
        font-size:18px;
    }

    .chat-input-area{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">Помощник ученикам</div>
    <button class="theme-btn" onclick="toggleTheme()">Тема</button>
</header>

<section id="home" class="page active center">
    <h1 class="big-title">Помощник ученикам</h1>

    <div class="button-grid" style="max-width:600px;">
        <button class="main-btn" onclick="openPage('subjectsMenu')">Предметы</button>
        <button class="main-btn" onclick="openSubjects('Зачеты')">Зачеты</button>
    </div>
</section>

<section id="subjectsMenu" class="page center">
    <button class="back-btn" onclick="openPage('home')">Назад</button>

    <h1 class="big-title">Предметы</h1>

    <div class="button-grid">
        <button class="main-btn" onclick="openSubjects('Практики')">Практики</button>
        <button class="main-btn" onclick="openSubjects('Лекции')">Лекции</button>
        <button class="main-btn" onclick="openSubjects('Домашки')">Домашки</button>
    </div>
</section>

<section id="subjectsPage" class="page">
    <button class="back-btn" onclick="goBackToMenu()">Назад</button>
    <h1 class="big-title" id="categoryTitle"></h1>

    <div class="subjects-grid" id="subjectsGrid"></div>
</section>

<section id="chatPage" class="page">
    <button class="back-btn" onclick="openPage('subjectsPage')">Назад</button>

    <div class="chat-wrapper">
        <div class="chat-header">
            <h2 id="chatTitle"></h2>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">

            <input type="file" id="fileInput" class="hidden">

            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>

            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</section>

<script>
const subjects = [
    'Родной язык',
    'Физра',
    'Биология',
    'Литература',
    'Иностранный язык',
    'Физика',
    'География',
    'Химия',
    'ОБЗР',
    'Русский язык',
    'История',
    'Информатика',
    'Обществознание',
    'Математика'
];

let currentCategory = '';
let currentSubject = '';
let selectedFile = null;

function openPage(pageId){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById(pageId).classList.add('active');
}

function openSubjects(category){
    currentCategory = category;

    document.getElementById('categoryTitle').textContent = category;

    const grid = document.getElementById('subjectsGrid');
    grid.innerHTML = '';

    subjects.forEach(subject=>{
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.textContent = subject;

        card.onclick = ()=>{
            openChat(category, subject);
        };

        grid.appendChild(card);
    });

    openPage('subjectsPage');
}

function openChat(category, subject){
    currentSubject = subject;

    document.getElementById('chatTitle').textContent = `${category} — ${subject}`;

    loadMessages();

    openPage('chatPage');
}

function goBackToMenu(){
    if(currentCategory === 'Зачеты'){
        openPage('home');
    } else {
        openPage('subjectsMenu');
    }
}

function getStorageKey(){
    return `${currentCategory}_${currentSubject}`;
}

function sendMessage(){
    const input = document.getElementById('messageInput');
    const text = input.value.trim();

    if(text === '' && !selectedFile){
        return;
    }

    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];

    const newMessage = {
        text:text,
        file:null,
        fileName:null,
        image:null
    };

    if(selectedFile){
        const reader = new FileReader();

        reader.onload = function(e){
            if(selectedFile.type.startsWith('image/')){
                newMessage.image = e.target.result;
            } else {
                newMessage.file = e.target.result;
                newMessage.fileName = selectedFile.name;
            }

            messages.push(newMessage);
            localStorage.setItem(getStorageKey(), JSON.stringify(messages));

            renderMessages(messages);

            input.value = '';
            selectedFile = null;
            document.getElementById('fileInput').value = '';
        };

        reader.readAsDataURL(selectedFile);
    } else {
        messages.push(newMessage);
        localStorage.setItem(getStorageKey(), JSON.stringify(messages));

        renderMessages(messages);

        input.value = '';
    }
}

function loadMessages(){
    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];
    renderMessages(messages);
}

function renderMessages(messages){
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = '';

    messages.forEach((msg,index)=>{
        const div = document.createElement('div');
        div.className = 'message';

        const del = document.createElement('button');
        del.className = 'delete';
        del.innerHTML = '×';

        del.onclick = ()=>{
            deleteMessage(index);
        };

        div.appendChild(del);

        if(msg.text){
            const p = document.createElement('p');
            p.textContent = msg.text;
            div.appendChild(p);
        }

        if(msg.image){
            const img = document.createElement('img');
            img.src = msg.image;
            img.className = 'preview-image';
            div.appendChild(img);
        }

        if(msg.file && msg.fileName){
            const link = document.createElement('a');
            link.href = msg.file;
            link.download = msg.fileName;
            link.textContent = '📁 ' + msg.fileName;
            link.className = 'file-preview';
            div.appendChild(link);
        }

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

function deleteMessage(index){
    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];

    messages.splice(index,1);

    localStorage.setItem(getStorageKey(), JSON.stringify(messages));

    renderMessages(messages);
}

function toggleTheme(){
    document.body.classList.toggle('dark');

    if(document.body.classList.contains('dark')){
        localStorage.setItem('theme','dark');
    } else {
        localStorage.setItem('theme','light');
    }
}

window.onload = ()=>{
    const theme = localStorage.getItem('theme');

    if(theme === 'dark'){
        document.body.classList.add('dark');
    }
};


document.getElementById('fileInput').addEventListener('change', function(e){
    selectedFile = e.target.files[0];
});
</script>

</body>
</html>
