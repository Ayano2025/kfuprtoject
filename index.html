
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник ученикам от Альберта группы 5551</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop') center center/cover no-repeat fixed;
    position:relative;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(2px);
    z-index:-1;
}

header{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:300;
    letter-spacing:1px;
}

.theme-btn,
.main-btn,
.back-btn,
.send-btn,
.attach-btn{
    border:none;
    border-radius:28px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.12);
    color:white;
    cursor:pointer;
    transition:0.3s ease;
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.theme-btn:hover,
.main-btn:hover,
.back-btn:hover,
.send-btn:hover,
.attach-btn:hover,
.subject-card:hover{
    transform:scale(1.03);
    background:rgba(255,255,255,0.18);
}

.page{
    min-height:100vh;
    padding:40px 20px;
    display:none;
    opacity:0;
    transform:translateY(30px);
    transition:0.35s ease;
}

.page.active{
    opacity:1;
    transform:translateY(0px);
}

#home.active,
#subjectsMenu.active{
    display:flex !important;
}

#subjectsPage.active,
#chatPage.active{
    display:block !important;
}

.center{
    display:flex !important;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:30px;
}

.big-title{
    font-size:64px;
    font-weight:200;
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.button-grid{
    position:relative;
    z-index:5;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    width:100%;
    max-width:900px;
}

.main-btn{
    min-height:140px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:500;
    padding:40px 20px;
    font-size:24px;
}

.subjects-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:40px;
}

.subject-card{
    padding:24px;
    text-align:center;
    border-radius:24px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15);
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.back-btn{
    padding:14px 22px;
    margin-bottom:25px;
}

.chat-wrapper{
    max-width:1000px;
    margin:auto;
    border-radius:32px;
    overflow:hidden;
    backdrop-filter:blur(22px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

.chat-header{
    padding:25px;
    background:rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.chat-header h2{
    font-size:36px;
    font-weight:300;
}

.chat-box{
    height:60vh;
    overflow-y:auto;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    position:relative;
    padding:18px;
    border-radius:24px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
}

.message .delete{
    position:absolute;
    top:8px;
    right:8px;
    width:26px;
    height:26px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    color:white;
    cursor:pointer;
}

.chat-input-area{
    display:flex;
    gap:12px;
    padding:20px;
}

.chat-input{
    flex:1;
    padding:18px;
    border:none;
    border-radius:24px;
    outline:none;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
}

.chat-input::placeholder{
    color:rgba(255,255,255,0.7);
}

.send-btn,
.attach-btn{
    padding:18px 22px;
}

.file-preview{
    display:inline-block;
    margin-top:10px;
    color:white;
}

img.preview-image{
    max-width:240px;
    border-radius:18px;
    margin-top:10px;
}

.hidden{
    display:none;
}

@media(max-width:700px){
    .big-title{
        font-size:42px;
    }

    .chat-input-area{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">Помощник ученикам</div>
    <button class="theme-btn" onclick="toggleTheme()">Тема</button>
</header>

<section id="home" class="page center">
    <h1 class="big-title">Помощник ученикам</h1>

    <div class="button-grid" style="max-width:600px;">
        <button class="main-btn" onclick="openPage('subjectsMenu')">Предметы</button>
        <button class="main-btn" onclick="openSubjects('Зачеты')">Зачеты</button>
    </div>
</section>

<section id="subjectsMenu" class="page center">
    <button class="back-btn" onclick="openPage('home')">Назад</button>

    <h1 class="big-title">Предметы</h1>

    <div class="button-grid">
        <button class="main-btn" onclick="openSubjects('Практики')">Практики</button>
        <button class="main-btn" onclick="openSubjects('Лекции')">Лекции</button>
        <button class="main-btn" onclick="openSubjects('Домашки')">Домашки</button>
    </div>
</section>

<section id="subjectsPage" class="page">
    <button class="back-btn" onclick="goBackToMenu()">Назад</button>
    <h1 class="big-title" id="categoryTitle"></h1>

    <div class="subjects-grid" id="subjectsGrid"></div>
</section>

<section id="chatPage" class="page">
    <button class="back-btn" onclick="openPage('subjectsPage')">Назад</button>

    <div class="chat-wrapper">
        <div class="chat-header">
            <h2 id="chatTitle"></h2>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">

            <input type="file" id="fileInput" class="hidden">

            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>

            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</section>

<script>
const subjects = [
    'Родной язык',
    'Физра',
    'Биология',
    'Литература',
    'Иностранный язык',
    'Физика',
    'География',
    'Химия',
    'ОБЗР',
    'Русский язык',
    'История',
    'Информатика',
    'Обществознание',
    'Математика'
];

let currentCategory = '';
let currentSubject = '';
let selectedFile = null;

function openPage(pageId){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
        page.style.display = 'none';
    });

    const targetPage = document.getElementById(pageId);

    targetPage.style.display = 'block';

    requestAnimationFrame(()=>{
        targetPage.classList.add('active');
    });

    window.scrollTo(0,0);
}

window.addEventListener('DOMContentLoaded',()=>{
    document.querySelectorAll('.page').forEach(page=>{
        page.style.display = 'none';
        page.classList.remove('active');
    });

    const homePage = document.getElementById('home');

    homePage.style.display = 'flex';

    requestAnimationFrame(()=>{
        homePage.classList.add('active');
    });
});

    document.getElementById('home').style.display = 'block';

    setTimeout(()=>{
        document.getElementById('home').classList.add('active');
    },10);
}););

    document.getElementById(pageId).classList.add('active');
}

function openSubjects(category){
    currentCategory = category;

    document.getElementById('categoryTitle').textContent = category;

    const grid = document.getElementById('subjectsGrid');
    grid.innerHTML = '';

    subjects.forEach(subject=>{
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.textContent = subject;

        card.onclick = ()=>{
            openChat(category, subject);
        };

        grid.appendChild(card);
    });

    openPage('subjectsPage');
}

function openChat(category, subject){
    currentSubject = subject;

    document.getElementById('chatTitle').textContent = `${category} — ${subject}`;

    loadMessages();

    openPage('chatPage');
}

function goBackToMenu(){
    if(currentCategory === 'Зачеты'){
        openPage('home');
    } else {
        openPage('subjectsMenu');
    }
}

function getStorageKey(){
    return `${currentCategory}_${currentSubject}`;
}

function sendMessage(){
    const input = document.getElementById('messageInput');
    const text = input.value.trim();

    if(text === '' && !selectedFile){
        return;
    }

    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];

    const newMessage = {
        text:text,
        file:null,
        fileName:null,
        image:null
    };

    if(selectedFile){
        const reader = new FileReader();

        reader.onload = function(e){
            if(selectedFile.type.startsWith('image/')){
                newMessage.image = e.target.result;
            } else {
                newMessage.file = e.target.result;
                newMessage.fileName = selectedFile.name;
            }

            messages.push(newMessage);
            localStorage.setItem(getStorageKey(), JSON.stringify(messages));

            renderMessages(messages);

            input.value = '';
            selectedFile = null;
            document.getElementById('fileInput').value = '';
        };

        reader.readAsDataURL(selectedFile);
    } else {
        messages.push(newMessage);
        localStorage.setItem(getStorageKey(), JSON.stringify(messages));

        renderMessages(messages);

        input.value = '';
    }
}

function loadMessages(){
    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];
    renderMessages(messages);
}

function renderMessages(messages){
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = '';

    messages.forEach((msg,index)=>{
        const div = document.createElement('div');
        div.className = 'message';

        const del = document.createElement('button');
        del.className = 'delete';
        del.innerHTML = '×';

        del.onclick = ()=>{
            deleteMessage(index);
        };

        div.appendChild(del);

        if(msg.text){
            const p = document.createElement('p');
            p.textContent = msg.text;
            div.appendChild(p);
        }

        if(msg.image){
            const img = document.createElement('img');
            img.src = msg.image;
            img.className = 'preview-image';
            div.appendChild(img);
        }

        if(msg.file && msg.fileName){
            const link = document.createElement('a');
            link.href = msg.file;
            link.download = msg.fileName;
            link.textContent = '📁 ' + msg.fileName;
            link.className = 'file-preview';
            div.appendChild(link);
        }

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

function deleteMessage(index){
    const messages = JSON.parse(localStorage.getItem(getStorageKey())) || [];

    messages.splice(index,1);

    localStorage.setItem(getStorageKey(), JSON.stringify(messages));

    renderMessages(messages);
}

function toggleTheme(){
    document.body.classList.toggle('dark');

    if(document.body.classList.contains('dark')){
        localStorage.setItem('theme','dark');
    } else {
        localStorage.setItem('theme','light');
    }
}

window.onload = ()=>{
    const theme = localStorage.getItem('theme');

    if(theme === 'dark'){
        document.body.classList.add('dark');
    }
};


document.getElementById('fileInput').addEventListener('change', function(e){
    selectedFile = e.target.files[0];
});
</script>

</body>
</html>
