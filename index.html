
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник ученикам</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    min-height:100vh;
    color:white;
    overflow:hidden;
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat fixed;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(3px);
    z-index:-1;
}

.page{
    display:none;
    width:100%;
    min-height:100vh;
    padding:30px;
    animation:fade .35s ease;
}

.page.active{
    display:flex;
    flex-direction:column;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.logo{
    font-size:42px;
    font-weight:600;
}

.theme-btn,
.back-btn,
.send-btn,
.attach-btn{
    border:none;
    border-radius:20px;
    padding:14px 20px;
    color:white;
    cursor:pointer;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.18);
}

.center-box{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.title{
    font-size:72px;
    margin-bottom:50px;
    text-align:center;
    font-weight:300;
}

.grid{
    width:100%;
    max-width:900px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    min-height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:28px;
    color:white;
    border-radius:30px;
    cursor:pointer;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.16);
    transition:.3s ease;
}

.card:hover{
    transform:scale(1.04);
    background:rgba(255,255,255,0.18);
}

.subject-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    margin-top:30px;
}

.subject-btn{
    padding:22px;
    border-radius:24px;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
}

.chat-wrapper{
    width:100%;
    max-width:1000px;
    margin:auto;
    display:flex;
    flex-direction:column;
    height:80vh;
    border-radius:30px;
    overflow:hidden;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.14);
}

.chat-header{
    padding:24px;
    font-size:30px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

.message{
    position:relative;
    padding:18px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.12);
}

.delete{
    position:absolute;
    top:10px;
    right:10px;
    width:24px;
    height:24px;
    border:none;
    border-radius:50%;
    cursor:pointer;
}

.chat-input-area{
    display:flex;
    gap:12px;
    padding:20px;
}

.chat-input{
    flex:1;
    border:none;
    border-radius:20px;
    padding:18px;
    color:white;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
}

.chat-input::placeholder{
    color:rgba(255,255,255,0.7);
}

.preview-image{
    max-width:240px;
    margin-top:10px;
    border-radius:14px;
}

.hidden{
    display:none;
}

@media(max-width:700px){
    .title{
        font-size:42px;
    }

    .logo{
        font-size:28px;
    }

    .card{
        min-height:120px;
        font-size:22px;
    }

    .chat-input-area{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<section id="home" class="page active">
<header>
<div class="logo">Помощник ученикам</div>
<button class="theme-btn">Тема</button>
</header>

<div class="center-box">
<h1 class="title">Помощник ученикам</h1>

<div class="grid">
<div class="card" onclick="openSubjectsMenu()">Предметы</div>
<div class="card" onclick="openSubjects('Зачеты')">Зачеты</div>
</div>
</div>
</section>

<section id="subjectsMenu" class="page">
<header>
<button class="back-btn" onclick="openPage('home')">Назад</button>
</header>

<div class="center-box">
<h1 class="title">Предметы</h1>

<div class="grid">
<div class="card" onclick="openSubjects('Практики')">Практики</div>
<div class="card" onclick="openSubjects('Лекции')">Лекции</div>
<div class="card" onclick="openSubjects('Домашки')">Домашки</div>
</div>
</div>
</section>

<section id="subjectsPage" class="page">
<header>
<button class="back-btn" onclick="goBack()">Назад</button>
</header>

<h1 class="title" id="categoryTitle"></h1>

<div class="subject-grid" id="subjectsGrid"></div>
</section>

<section id="chatPage" class="page">
<header>
<button class="back-btn" onclick="openPage('subjectsPage')">Назад</button>
</header>

<div class="chat-wrapper">
<div class="chat-header" id="chatTitle"></div>
<div class="chat-box" id="chatBox"></div>

<div class="chat-input-area">
<input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
<input type="file" id="fileInput" class="hidden">
<button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
<button class="send-btn" onclick="sendMessage()">Отправить</button>
</div>
</div>
</section>

<script>
const subjects=[
'Родной язык','Физра','Биология','Литература','Иностранный язык','Физика','География','Химия','ОБЗР','Русский язык','История','Информатика','Обществознание','Математика'
];

let currentCategory='';
let currentSubject='';
let selectedFile=null;

function openPage(id){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}

function openSubjectsMenu(){
    openPage('subjectsMenu');
}

function openSubjects(category){
    currentCategory=category;

    document.getElementById('categoryTitle').innerText=category;

    const grid=document.getElementById('subjectsGrid');
    grid.innerHTML='';

    subjects.forEach(subject=>{
        const btn=document.createElement('button');
        btn.className='subject-btn';
        btn.innerText=subject;
        btn.onclick=()=>openChat(category,subject);
        grid.appendChild(btn);
    });

    openPage('subjectsPage');
}

function openChat(category,subject){
    currentSubject=subject;
    document.getElementById('chatTitle').innerText=`${category} — ${subject}`;
    loadMessages();
    openPage('chatPage');
}

function goBack(){
    if(currentCategory==='Зачеты'){
        openPage('home');
    }else{
        openPage('subjectsMenu');
    }
}

function getStorageKey(){
    return currentCategory+'_'+currentSubject;
}

function sendMessage(){
    const input=document.getElementById('messageInput');
    const text=input.value.trim();

    if(!text && !selectedFile)return;

    const messages=JSON.parse(localStorage.getItem(getStorageKey()))||[];

    const message={
        text:text,
        image:null,
        file:null,
        fileName:null
    };

    if(selectedFile){
        const reader=new FileReader();

        reader.onload=e=>{
            if(selectedFile.type.startsWith('image/')){
                message.image=e.target.result;
            }else{
                message.file=e.target.result;
                message.fileName=selectedFile.name;
            }

            messages.push(message);
            localStorage.setItem(getStorageKey(),JSON.stringify(messages));
            renderMessages(messages);
        };

        reader.readAsDataURL(selectedFile);
    }else{
        messages.push(message);
        localStorage.setItem(getStorageKey(),JSON.stringify(messages));
        renderMessages(messages);
    }

    input.value='';
    selectedFile=null;
}

function loadMessages(){
    const messages=JSON.parse(localStorage.getItem(getStorageKey()))||[];
    renderMessages(messages);
}

function renderMessages(messages){
    const box=document.getElementById('chatBox');
    box.innerHTML='';

    messages.forEach((msg,index)=>{
        const div=document.createElement('div');
        div.className='message';

        const del=document.createElement('button');
        del.className='delete';
        del.innerText='×';
        del.onclick=()=>deleteMessage(index);

        div.appendChild(del);

        if(msg.text){
            const p=document.createElement('p');
            p.innerText=msg.text;
            div.appendChild(p);
        }

        if(msg.image){
            const img=document.createElement('img');
            img.src=msg.image;
            img.className='preview-image';
            div.appendChild(img);
        }

        if(msg.file){
            const a=document.createElement('a');
            a.href=msg.file;
            a.download=msg.fileName;
            a.innerText='📁 '+msg.fileName;
            a.style.color='white';
            div.appendChild(a);
        }

        box.appendChild(div);
    });
}

function deleteMessage(index){
    const messages=JSON.parse(localStorage.getItem(getStorageKey()))||[];
    messages.splice(index,1);
    localStorage.setItem(getStorageKey(),JSON.stringify(messages));
    renderMessages(messages);
}

document.getElementById('fileInput').addEventListener('change',e=>{
    selectedFile=e.target.files[0];
});
</script>
</body>
</html>
